$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline
experiment_name: readmission-prediction
description: >
  Dev pipeline: prep → train → evaluate → register
  for 30-day hospital readmission risk prediction.
  Components are consumed from the local workspace (not the shared registry).
  Used to validate pipeline logic before promoting to higher environments.

inputs:
  raw_data:
    type: uri_file
    path: azureml:readmission-raw-data@latest

outputs:
  train_data:
  val_data:
  test_data:
  trained_model:
  evaluation_output:
  model_info_output_path:

settings:
  default_datastore: azureml:workspaceblobstore
  default_compute: azureml:cpu-cluster
  continue_on_step_failure: false

jobs:
  prep_data:
    component: azureml:readmission_prep@latest
    inputs:
      raw_data: ${{parent.inputs.raw_data}}
    outputs:
      train_data: ${{parent.outputs.train_data}}
      val_data: ${{parent.outputs.val_data}}
      test_data: ${{parent.outputs.test_data}}

  train_model:
    component: azureml:readmission_train@latest
    inputs:
      train_data: ${{parent.jobs.prep_data.outputs.train_data}}
      val_data: ${{parent.jobs.prep_data.outputs.val_data}}
    outputs:
      model_output: ${{parent.outputs.trained_model}}

  evaluate_model:
    component: azureml:readmission_evaluate@latest
    inputs:
      model_name: readmission-model
      model_input: ${{parent.jobs.train_model.outputs.model_output}}
      test_data: ${{parent.jobs.prep_data.outputs.test_data}}
    outputs:
      evaluation_output: ${{parent.outputs.evaluation_output}}

  register_model:
    component: azureml:readmission_register@latest
    inputs:
      model_name: readmission-model
      model_path: ${{parent.jobs.train_model.outputs.model_output}}
      evaluation_output: ${{parent.jobs.evaluate_model.outputs.evaluation_output}}
    outputs:
      model_info_output_path: ${{parent.outputs.model_info_output_path}}
